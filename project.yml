name: AnimalSpin
options:
  bundleIdPrefix: com.circuitstitch.toys
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "GDV76FJJZ5"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  AnimalSpin:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.circuitstitch.toys.animals
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
    info:
      path: Support/Info.plist
      properties:
        CFBundleDisplayName: Animal Spin
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "3"
        UILaunchScreen: {}
        UIStatusBarHidden: true
        UIViewControllerBasedStatusBarAppearance: false
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleLocalizations:
          - en
          - ar
          - de
          - es
          - fr
          - hi
          - id
          - it
          - ja
          - ko
          - nl
          - pl
          - pt
          - ru
          - th
          - tr
          - vi

  AnimalSpinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/AnimalSpinTests
    dependencies:
      - target: AnimalSpin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.circuitstitch.toys.animals.tests
        GENERATE_INFOPLIST_FILE: YES

  # UI-test bundle: drives the app in a separate runner process via the Accessibility APIs
  # (XCUITest). Used to capture screenshots of any screen/locale/Dynamic-Type size headlessly and
  # to regression-test parent-facing flows. Runs on the simulator with no signing; on a device it
  # inherits the app's signing (team GDV76FJJZ5 + the PLA-acceptance caveat in CLAUDE.md).
  AnimalSpinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/AnimalSpinUITests
    dependencies:
      - target: AnimalSpin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.circuitstitch.toys.animals.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: AnimalSpin

schemes:
  AnimalSpin:
    build:
      targets:
        AnimalSpin: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AnimalSpinTests
        - AnimalSpinUITests
